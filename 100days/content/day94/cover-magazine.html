<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 675px;
    font-family: "PingFang TC", "Noto Sans TC", sans-serif;
    background: #f8f7f4;
    color: #111;
    padding: 56px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top { display: flex; flex-direction: column; }
  .tag {
    font-size: 14px;
    font-weight: 700;
    color: #c0392b;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .title {
    font-size: 88px;
    font-weight: 900;
    line-height: 1.05;
    color: #111;
    margin-bottom: 28px;
  }
  .accent-line {
    width: 72px;
    height: 5px;
    background: #c0392b;
  }
  .mid {
    display: flex;
    gap: 0;
    border-top: 1.5px solid #ccc;
    padding-top: 24px;
  }
  .col {
    flex: 1;
    padding-right: 36px;
    border-right: 1px solid #ddd;
    margin-right: 36px;
  }
  .col:last-child { border-right: none; margin-right: 0; padding-right: 0; }
  .col-label {
    font-size: 10px;
    font-weight: 700;
    color: #c0392b;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .col-title {
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #111;
  }
  .col-body {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid #ccc;
    padding-top: 14px;
    font-size: 12px;
    color: #aaa;
    font-weight: 500;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="top">
    <div class="tag">Day 94 · Claude Code 政策</div>
    <div class="title">第三方套殼時代<br>正式終結了嗎？</div>
    <div class="accent-line"></div>
  </div>
  <div class="mid">
    <div class="col">
      <div class="col-label">政策變更</div>
      <div class="col-title">4/5 起訂閱不涵蓋套殼</div>
      <div class="col-body">OpenClaw 等工具需改用<br>pay-as-you-go 計費</div>
    </div>
    <div class="col">
      <div class="col-label">仍可使用</div>
      <div class="col-title">官方工具不受影響</div>
      <div class="col-body">Claude Code headless 與<br>Agent SDK 本地工具照常</div>
    </div>
    <div class="col">
      <div class="col-label">補償方案</div>
      <div class="col-title">最高 $200 一次性額度</div>
      <div class="col-body">4/3–4/17 限期領取<br>Settings › Usage › Claim</div>
    </div>
  </div>
  <div class="footer">
    <span>2026.04.04</span>
    <span>Ci</span>
  </div>
</body>
</html>
